name: MLflow CI Pipeline - Kriteria Advance

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Sesuaikan dengan versi Python Anda

      - name: Install Dependencies
        run: |
          pip install mlflow pandas scikit-learn
          # Jika Anda memiliki file requirements, gunakan perintah di bawah ini:
          # pip install -r Workflow_CI/MLProject/requirements.txt

      - name: Run Modelling (Training Model)
        run: |
          cd Workflow_CI/MLProject
          python modelling.py
        # Langkah ini akan mengeksekusi script Anda untuk melatih model

      - name: Save Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artefak-ispu
          # Sesuaikan 'model_output' dengan nama folder tempat modelling.py menyimpan model MLflow Anda
          path: Workflow_CI/MLProject/model_output/ 

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image via MLflow (Syarat Advance)
        run: |
          cd Workflow_CI/MLProject
          # Perintah ini yang diminta oleh reviewer kelas Anda
          mlflow models build-docker -m model_output -n ${{ secrets.DOCKER_USERNAME }}/ispu-mlproject:latest

      - name: Push Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ispu-mlproject:latest
